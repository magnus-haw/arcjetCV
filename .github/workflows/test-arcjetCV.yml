name: ⚙️ Test arcjetCV

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]  # macos-latest, windows-latest
        python-version: ['3.10']
    env:
      DISPLAY: ':99.0'

    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: conda-incubator/setup-miniconda@v2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install apt dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y libegl1 libdbus-1-3 libxkbcommon-x11-0 \
              libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
              libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0 \
              x11-utils libxcb-cursor0 libopengl0
      - name: Install conda dependencies
        run: |
          conda env create -f env/arcjetCV_env_cpu.yml -n arcjetCV
          conda install -n arcjetCV -c conda-forge pytest pytest-qt pytest-mock qt-main pytest-xvfb
          conda run -n arcjetCV python -m pip install -e .
          conda run -n arcjetCV python -c "import arcjetCV"

      - name: Test with pytest
        run: |
          conda run -n arcjetCV pytest -s
